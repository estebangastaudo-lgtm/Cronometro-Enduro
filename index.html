<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cronómetro Enduro</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root { font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif; }
    body { margin: 0; background: #0b0f17; color: #e8eefc; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 14px; }
    .card { background: #121a2a; border: 1px solid #1f2a44; border-radius: 16px; padding: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    h1 { font-size: 16px; margin: 0 0 10px; font-weight: 900; letter-spacing: .2px; opacity: .95; }
    .time { font-variant-numeric: tabular-nums; font-size: 52px; line-height: 1; margin: 10px 0 8px; font-weight: 950; }
    .sub { font-variant-numeric: tabular-nums; opacity: .82; margin-bottom: 10px; }

    .topgrid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 860px) { .topgrid { grid-template-columns: 1.1fr .9fr; } }

    .controlsTop { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    button {
      padding: 14px 12px; border-radius: 14px; border: 1px solid #26365c;
      background: #1a2642; color: #e8eefc; font-size: 16px; font-weight: 850;
      cursor: pointer; touch-action: manipulation;
    }
    button:active { transform: scale(.99); }
    button.primary { background: #2a4cff; border-color: #2a4cff; }
    button.warn { background: #2b1a1a; border-color: #5a2a2a; color: #ffd6d6; }
    button.ok { background: #17301f; border-color: #2a5a3a; color: #d8ffe7; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .cfg { background: #0e1526; border: 1px solid #1f2a44; border-radius: 14px; padding: 12px; }
    .cfg h2 { margin: 0 0 10px; font-size: 14px; opacity: .9; }
    .cfg .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .cfg .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .cfg label { font-size: 12px; opacity: .82; display: block; margin-bottom: 4px; }
    .cfg input, .cfg select {
      width: 100%; box-sizing: border-box;
      background: #121a2a; border: 1px solid #26365c; color: #e8eefc;
      padding: 10px 10px; border-radius: 10px; font-size: 14px;
    }
    .cfg .note { margin-top: 8px; font-size: 12px; opacity: .7; line-height: 1.25; }

    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    @media (min-width: 860px) { .btns { grid-template-columns: 1fr 1fr 1fr 1fr; } }

    .riderBtn {
      display: grid; gap: 8px;
      background: #0e1526; border: 1px solid #1f2a44; border-radius: 14px;
      padding: 12px; text-align: left;
    }
    .riderBtn .name { font-weight: 950; font-size: 20px; line-height: 1.05; }
    .riderBtn .line1 { font-size: 14px; opacity: .92; font-variant-numeric: tabular-nums; }
    .riderBtn .line2 { display:flex; justify-content: space-between; gap: 10px; font-size: 14px; font-variant-numeric: tabular-nums; }
    .riderBtn .label { opacity:.7; font-weight: 800; }
    .riderBtn .val { font-weight: 950; }

    /* Colores por piloto (borde + acento) */
    .r0 { border-color:#2a4cff; box-shadow: 0 0 0 1px rgba(42,76,255,.15) inset; }
    .r1 { border-color:#00c2ff; box-shadow: 0 0 0 1px rgba(0,194,255,.15) inset; }
    .r2 { border-color:#00d084; box-shadow: 0 0 0 1px rgba(0,208,132,.15) inset; }
    .r3 { border-color:#ffb000; box-shadow: 0 0 0 1px rgba(255,176,0,.15) inset; }
    .r4 { border-color:#ff5c7a; box-shadow: 0 0 0 1px rgba(255,92,122,.15) inset; }
    .r5 { border-color:#b56bff; box-shadow: 0 0 0 1px rgba(181,107,255,.15) inset; }
    .r6 { border-color:#7bdcff; box-shadow: 0 0 0 1px rgba(123,220,255,.15) inset; }
    .r7 { border-color:#a7ff4f; box-shadow: 0 0 0 1px rgba(167,255,79,.15) inset; }

    .bottomActions { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top: 10px; }
    @media (min-width: 860px) { .bottomActions { grid-template-columns: 1fr 1fr 1fr 1fr; } }

    .tables { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 12px; }
    @media (min-width: 860px) { .tables { grid-template-columns: 1fr 1fr; } }

    .tableCard { background: #0e1526; border: 1px solid #1f2a44; border-radius: 14px; padding: 12px; }
    .tableCard h3 { margin: 0 0 8px; font-size: 14px; opacity: .92; }
    .tableCard .scroll { max-height: 360px; overflow: auto; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    th, td { padding: 8px 8px; border-bottom: 1px solid #1f2a44; font-size: 13px; }
    th { position: sticky; top: 0; background: #0e1526; text-align: left; opacity: .92; }
    td:last-child, th:last-child { text-align: right; }

    .foot { margin-top: 10px; font-size: 12px; opacity: .65; }

    /* Modo solo botones */
    body.buttonsOnly .cfg,
    body.buttonsOnly .tables,
    body.buttonsOnly .foot { display: none; }
    body.buttonsOnly .wrap { max-width: 1000px; }
    body.buttonsOnly .time { font-size: 58px; }
    body.buttonsOnly .riderBtn { padding: 16px; }
    body.buttonsOnly .riderBtn .name { font-size: 24px; }
    body.buttonsOnly .btns { grid-template-columns: 1fr 1fr; }
    @media (min-width: 860px) { body.buttonsOnly .btns { grid-template-columns: 1fr 1fr 1fr 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>⏱️ Cronómetro Enduro (8 pilotos)</h1>

      <div class="topgrid">
        <div>
          <div class="time" id="time">00:00.00</div>
          <div class="sub" id="sub">Listo</div>

          <div class="controlsTop">
            <button id="startPause" class="primary">Iniciar</button>
          </div>

          <div class="btns" id="ridersBtns"></div>

          <!-- Acciones abajo de los 8 botones -->
          <div class="bottomActions">
            <button id="reset" class="warn" disabled>Reset tiempo</button>
            <button id="toggleButtons" disabled>Solo botones</button>
            <button id="export" class="ok" disabled>Exportar CSV</button>
            <button id="clearAll" disabled>Vaciar tiempos</button>
          </div>

          <div class="foot">Tip: Deshacer/Rehacer por piloto. CSV sale listo para Excel con vueltas por columnas.</div>
        </div>

        <div class="cfg">
          <h2>Configuración (antes de arrancar)</h2>

          <div class="grid3">
            <div>
              <label>Gap largada (seg)</label>
              <input id="gap" type="number" min="0" step="1" value="15" />
            </div>
            <div>
              <label>Anti doble-tap (ms)</label>
              <input id="dblMs" type="number" min="0" step="100" value="2000" />
            </div>
            <div>
              <label>Parciales</label>
              <select id="sectors">
                <option value="0" selected>OFF (solo vuelta)</option>
                <option value="2">ON (2 parciales)</option>
                <option value="3">ON (3 parciales)</option>
              </select>
            </div>
          </div>

          <div class="grid2">
            <div><label>Piloto 1</label><input class="rname" data-i="0" /></div>
            <div><label>Piloto 2</label><input class="rname" data-i="1" /></div>
            <div><label>Piloto 3</label><input class="rname" data-i="2" /></div>
            <div><label>Piloto 4</label><input class="rname" data-i="3" /></div>
            <div><label>Piloto 5</label><input class="rname" data-i="4" /></div>
            <div><label>Piloto 6</label><input class="rname" data-i="5" /></div>
            <div><label>Piloto 7</label><input class="rname" data-i="6" /></div>
            <div><label>Piloto 8</label><input class="rname" data-i="7" /></div>
          </div>

          <div class="note">
            <b>NETO</b> = tiempo total - offset de largada (P1=0s, P2=gap, ...).<br/>
            Con parciales: cada tap hace S1→S2→S3→(cierra VUELTA).
          </div>
        </div>
      </div>

      <div class="tables" id="tables"></div>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const STORAGE_KEY = "cronometro_enduro_v3";

  const DEFAULT_NAMES = ["Esteban","Guille","Ariel","Richard","Gera","Fran","Ale","Franco"];

  const elTime = $("time");
  const elSub = $("sub");
  const btnStartPause = $("startPause");
  const btnReset = $("reset");
  const btnExport = $("export");
  const btnClearAll = $("clearAll");
  const btnToggleButtons = $("toggleButtons");
  const elGap = $("gap");
  const elDblMs = $("dblMs");
  const elSectors = $("sectors");
  const ridersBtns = $("ridersBtns");
  const tables = $("tables");

  let running = false;
  let startPerf = 0;
  let elapsedMs = 0;
  let rafId = null;

  // riders[i] = { name, events:[...], sectorIdx, lastTapEpoch, redo:[...] }
  let riders = Array.from({length: 8}, (_, i) => ({
    name: DEFAULT_NAMES[i],
    events: [],       // eventos SECTOR/LAP
    sectorIdx: 0,
    lastTapEpoch: 0,
    redo: []          // pila para rehacer
  }));

  function format(ms) {
    ms = Math.max(0, Math.floor(ms));
    const totalSeconds = Math.floor(ms / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    const centis = Math.floor((ms % 1000) / 10);
    return `${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}.${String(centis).padStart(2,"0")}`;
  }

  function nowElapsed() {
    return running ? (elapsedMs + (performance.now() - startPerf)) : elapsedMs;
  }

  function getGapMs() { return Math.max(0, Number(elGap.value || 0)) * 1000; }
  function getDblMs() { return Math.max(0, Number(elDblMs.value || 0)); }
  function getSectors() { return Math.max(0, Number(elSectors.value || 0)); } // 0,2,3
  function offsetMsFor(i) { return i * getGapMs(); }
  function totalNetMs(i, totalMs) { return Math.max(0, totalMs - offsetMsFor(i)); }

  function headerText() {
    if (!running) return (elapsedMs > 0 ? "Pausado" : "Listo");
    const sec = getSectors();
    return sec ? `Corriendo… (parciales ${sec})` : "Corriendo… (vueltas)";
  }

  function countLaps(r) { return r.events.filter(e => e.kind === "LAP").length; }
  function lastLap(r) { return [...r.events].reverse().find(e => e.kind === "LAP") || null; }

  function renderHeader() {
    elTime.textContent = format(nowElapsed());
    elSub.textContent = headerText();
    btnReset.disabled = (!running && elapsedMs === 0 && riders.every(r => r.events.length === 0));
    btnExport.disabled = riders.every(r => countLaps(r) === 0);
    btnClearAll.disabled = riders.every(r => r.events.length === 0);
    btnToggleButtons.disabled = false;
  }

  function renderButtons() {
    ridersBtns.innerHTML = "";
    const sec = getSectors();

    riders.forEach((r, i) => {
      const b = document.createElement("button");
      b.className = `riderBtn r${i}`;
      b.disabled = !running;

      const lapsN = countLaps(r);
      const ll = lastLap(r);

      const lastLapStr = ll ? format(ll.lapNetMs) : "00:00.00";
      const totalStr = ll ? format(ll.totalNetMs) : "00:00.00";

      const nextLapNo = lapsN + 1;

      // Texto como lo pediste
      b.innerHTML = `
        <div class="name">${r.name}</div>
        <div class="line1">${sec ? `Parcial ${r.sectorIdx+1}/${sec}` : `Vuelta ${nextLapNo}`}</div>
        <div class="line2"><span class="label">última vta</span><span class="val">${lastLapStr}</span></div>
        <div class="line2"><span class="label">total neto</span><span class="val">${totalStr}</span></div>
      `;
      b.addEventListener("click", () => mark(i));
      ridersBtns.appendChild(b);
    });
  }

  function renderTables() {
    tables.innerHTML = "";
    riders.forEach((r, i) => {
      const offSec = Math.round(offsetMsFor(i)/1000);

      const card = document.createElement("div");
      card.className = "tableCard";
      card.innerHTML = `
        <h3>${r.name} <span style="opacity:.7;font-weight:650;">(offset ${offSec}s)</span></h3>

        <div style="display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;">
          <button data-undo="${i}" ${r.events.length ? "" : "disabled"}>Deshacer</button>
          <button data-redo="${i}" ${r.redo.length ? "" : "disabled"}>Rehacer</button>
          <button data-clear="${i}" ${r.events.length ? "" : "disabled"}>Vaciar</button>
        </div>

        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Tipo</th>
                <th>Δ (neto)</th>
                <th>Total (neto)</th>
              </tr>
            </thead>
            <tbody>
              ${
                r.events.length
                ? r.events.map(e => `
                    <tr>
                      <td>${e.kind === "LAP" ? e.lapNo : ""}</td>
                      <td>${e.kind === "LAP" ? "VUELTA" : ("S"+e.sectorNo)}</td>
                      <td>${format(e.deltaNetMs)}</td>
                      <td>${format(e.totalNetMs)}</td>
                    </tr>
                  `).join("")
                : `<tr><td colspan="4" style="opacity:.7;">Sin registros todavía</td></tr>`
              }
            </tbody>
          </table>
        </div>
      `;
      tables.appendChild(card);
    });

    tables.querySelectorAll("button[data-undo]").forEach(btn =>
      btn.addEventListener("click", () => undo(Number(btn.dataset.undo)))
    );
    tables.querySelectorAll("button[data-redo]").forEach(btn =>
      btn.addEventListener("click", () => redo(Number(btn.dataset.redo)))
    );
    tables.querySelectorAll("button[data-clear]").forEach(btn =>
      btn.addEventListener("click", () => clearRider(Number(btn.dataset.clear)))
    );
  }

  function renderAll() {
    renderHeader();
    renderButtons();
    renderTables();
  }

  function tick() {
    renderHeader();
    if (running) rafId = requestAnimationFrame(tick);
  }

  function save() {
    const state = {
      running,
      elapsedMs,
      startedAtEpoch: running ? Date.now() : null,
      gapSec: Number(elGap.value || 0),
      dblMs: Number(elDblMs.value || 0),
      sectors: Number(elSectors.value || 0),
      riders
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // set defaults in inputs
      document.querySelectorAll(".rname").forEach((inp) => {
        const i = Number(inp.dataset.i);
        inp.value = DEFAULT_NAMES[i];
      });
      return;
    }
    try {
      const s = JSON.parse(raw);

      if (typeof s.gapSec === "number") elGap.value = String(s.gapSec);
      if (typeof s.dblMs === "number") elDblMs.value = String(s.dblMs);
      if (typeof s.sectors === "number") elSectors.value = String(s.sectors);

      if (Array.isArray(s.riders) && s.riders.length === 8) {
        riders = s.riders.map((r, i) => ({
          name: (r.name || DEFAULT_NAMES[i]),
          events: Array.isArray(r.events) ? r.events : [],
          sectorIdx: Number(r.sectorIdx || 0),
          lastTapEpoch: Number(r.lastTapEpoch || 0),
          redo: Array.isArray(r.redo) ? r.redo : []
        }));
      } else {
        // defaults
        riders.forEach((r,i) => r.name = DEFAULT_NAMES[i]);
      }

      document.querySelectorAll(".rname").forEach((inp) => {
        const i = Number(inp.dataset.i);
        inp.value = riders[i].name || DEFAULT_NAMES[i];
      });

      elapsedMs = Number(s.elapsedMs || 0);
      if (s.running && s.startedAtEpoch) {
        const extra = Date.now() - Number(s.startedAtEpoch);
        elapsedMs += Math.max(0, extra);
      }
      running = false; // reanuda manual (seguro)
    } catch {
      // defaults
      document.querySelectorAll(".rname").forEach((inp) => {
        const i = Number(inp.dataset.i);
        inp.value = DEFAULT_NAMES[i];
      });
    }
  }

  function start() {
    running = true;
    startPerf = performance.now();
    btnStartPause.textContent = "Pausar";
    btnReset.disabled = false;
    if (!rafId) rafId = requestAnimationFrame(tick);
    renderAll(); save();
  }

  function pause() {
    elapsedMs = nowElapsed();
    running = false;
    btnStartPause.textContent = "Iniciar";
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    renderAll(); save();
  }

  function resetTimeOnly() {
    running = false;
    elapsedMs = 0;
    startPerf = 0;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    btnStartPause.textContent = "Iniciar";
    renderAll(); save();
  }

  function clearAll() {
    riders.forEach(r => { r.events = []; r.redo = []; r.sectorIdx = 0; r.lastTapEpoch = 0; });
    renderAll(); save();
  }

  function recomputeSectorIdx(r) {
    const sectors = getSectors();
    if (sectors <= 0) { r.sectorIdx = 0; return; }
    const lastSector = [...r.events].reverse().find(e => e.kind === "SECTOR");
    if (!lastSector) r.sectorIdx = 0;
    else r.sectorIdx = (Number(lastSector.sectorNo) % sectors);
  }

  function mark(i) {
    const tEpoch = Date.now();
    const dbl = getDblMs();
    const r = riders[i];

    if (dbl > 0 && (tEpoch - (r.lastTapEpoch || 0)) < dbl) {
      if (!confirm(`¿Confirmás el tap seguido para ${r.name}?`)) return;
    }
    r.lastTapEpoch = tEpoch;

    // Si marcás algo nuevo, se borra la pila de rehacer (comportamiento estándar)
    r.redo = [];

    const totalMs = nowElapsed();
    const netMs = totalNetMs(i, totalMs);

    const sectors = getSectors();
    const isSectors = sectors > 0;

    const lastNet = (r.events.length ? r.events[r.events.length - 1].totalNetMs : 0);
    const deltaNet = netMs - lastNet;

    if (isSectors) {
      const sectorNo = r.sectorIdx + 1;

      r.events.push({
        kind: "SECTOR",
        riderIndex: i,
        riderName: r.name,
        sectorNo,
        totalMs,
        totalNetMs: netMs,
        deltaNetMs: deltaNet,
        stampEpoch: tEpoch
      });

      r.sectorIdx++;

      if (r.sectorIdx >= sectors) {
        const lapNo = r.events.filter(x => x.kind === "LAP").length + 1;
        const prevLap = [...r.events].reverse().find(x => x.kind === "LAP");
        const prevLapTotalNet = prevLap ? prevLap.totalNetMs : 0;
        const lapNet = netMs - prevLapTotalNet;

        r.events.push({
          kind: "LAP",
          riderIndex: i,
          riderName: r.name,
          lapNo,
          totalMs,
          totalNetMs: netMs,
          deltaNetMs: lapNet,
          lapNetMs: lapNet,
          stampEpoch: tEpoch
        });

        r.sectorIdx = 0;
      }
    } else {
      const lapNo = r.events.filter(x => x.kind === "LAP").length + 1;
      const prevLap = [...r.events].reverse().find(x => x.kind === "LAP");
      const prevLapTotalNet = prevLap ? prevLap.totalNetMs : 0;
      const lapNet = netMs - prevLapTotalNet;

      r.events.push({
        kind: "LAP",
        riderIndex: i,
        riderName: r.name,
        lapNo,
        totalMs,
        totalNetMs: netMs,
        deltaNetMs: lapNet,
        lapNetMs: lapNet,
        stampEpoch: tEpoch
      });
    }

    renderAll(); save();
  }

  function undo(i) {
    const r = riders[i];
    const last = r.events.pop();
    if (!last) return;
    r.redo.push(last);
    recomputeSectorIdx(r);
    renderAll(); save();
  }

  function redo(i) {
    const r = riders[i];
    const item = r.redo.pop();
    if (!item) return;
    r.events.push(item);
    recomputeSectorIdx(r);
    renderAll(); save();
  }

  function clearRider(i) {
    const r = riders[i];
    r.events = [];
    r.redo = [];
    r.sectorIdx = 0;
    r.lastTapEpoch = 0;
    renderAll(); save();
  }

  function csvSafeSemi(v) {
    // CSV con ; (mejor para Excel AR). Si hay ; o comillas o saltos, se comilla.
    const s = String(v ?? "");
    if (/[;"\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
    return s;
  }

  function exportCSVWide() {
    // Tabla ancha: piloto; cant vtas; vta1; vta2; ...; tiempo total
    const lapsByRider = riders.map(r => r.events.filter(e => e.kind === "LAP").map(e => format(e.lapNetMs)));
    const totalsByRider = riders.map(r => {
      const ll = lastLap(r);
      return ll ? format(ll.totalNetMs) : "00:00.00";
    });
    const maxLaps = Math.max(0, ...lapsByRider.map(a => a.length));

    const headers = ["piloto","cant vtas"];
    for (let k=1; k<=maxLaps; k++) headers.push(`vta${k}`);
    headers.push("tiempo total");

    const rows = [];
    rows.push(headers.map(csvSafeSemi).join(";"));

    riders.forEach((r, idx) => {
      const laps = lapsByRider[idx];
      const row = [r.name, String(laps.length)];
      for (let k=0; k<maxLaps; k++) row.push(laps[k] ?? "");
      row.push(totalsByRider[idx]);
      rows.push(row.map(csvSafeSemi).join(";"));
    });

    const blob = new Blob([rows.join("\n")], {type: "text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `tiempos_enduro_${new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  // Wiring
  btnStartPause.addEventListener("click", () => running ? pause() : start());
  btnReset.addEventListener("click", resetTimeOnly);
  btnClearAll.addEventListener("click", () => { if (confirm("¿Vaciar TODOS los registros?")) clearAll(); });
  btnExport.addEventListener("click", exportCSVWide);

  btnToggleButtons.addEventListener("click", () => {
    document.body.classList.toggle("buttonsOnly");
    save();
  });

  // Nombres editables
  document.querySelectorAll(".rname").forEach(inp => {
    const i = Number(inp.dataset.i);
    inp.value = riders[i].name || DEFAULT_NAMES[i];

    inp.addEventListener("input", () => {
      riders[i].name = (inp.value || DEFAULT_NAMES[i]).trim();
      renderAll(); save();
    });
  });

  elGap.addEventListener("input", () => { renderAll(); save(); });
  elDblMs.addEventListener("input", () => { save(); });
  elSectors.addEventListener("change", () => {
    riders.forEach(r => { r.sectorIdx = 0; r.redo = []; });
    renderAll(); save();
  });

  // Load state + render
  load();
  renderAll();

  window.addEventListener("visibilitychange", () => save());
  window.addEventListener("beforeunload", () => save());

  // SW
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
})();
</script>
</body>
</html>
